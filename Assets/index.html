<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />
        <link
                rel="shortcut icon"
                type="image/png"
                href="/plugins/screenplayers/eco-icon.png"
        />
        <title>ScreenPlayers Uploader</title>
        <script type="module" crossorigin src="index.js"></script>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <main class="app">
            <header class="header">
                <h1>🎬 ScreenPlayers Uploader</h1>
                <p class="subtitle">Upload your MP4 videos and MP3 music, manage your media and share them in-game!</p>
            </header>

            <section class="card">
                <h2>📤 Upload a file</h2>
                <p id="uploadHint" class="hint">Max file size: 15 MB. MP3 uploads require <strong>ffmpeg</strong> installed on the server host.</p>
                <div class="row">
                    <input id="fileInput" type="file" accept=".mp4,.mp3" />
                    <button id="uploadBtn" type="button">Upload</button>
                </div>
                <div id="uploadStatus" class="status"></div>
            </section>

            <section class="card">
                <h2>📁 My files</h2>
                <div id="myFiles" class="file-list"></div>
            </section>

            <section id="adminSection" class="card hidden">
                <h2>👑 All files (Admin)</h2>
                <div id="allFiles" class="file-list"></div>
            </section>
        </main>

        <div id="snackbar" class="snackbar"></div>
    </body>
</html>
